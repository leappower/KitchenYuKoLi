    <link rel="canonical" href="/products/" />
    <link rel="alternate" media="only screen and (max-width: 767px)" href="/products/index-mobile.html" />
    <link

    <link rel="alternate" media="only screen and (min-width: 1280px)" href="/products/index-pc.html" />
    <script>
      /* Responsive redirect — runs before render, no flash */
      (function () {
        if (window.__redirectChecked) return;
        window.__redirectChecked = true;

        var urlParams = new URLSearchParams(location.search);
        var cleanUrl = urlParams.get("clean-url");
        if (cleanUrl) {
          history.replaceState({}, "", cleanUrl);
          return;
        }

        if (window.__spaNavigating) return;

        var currentFile = location.pathname.split("/").pop();
        if (window.DeviceUtils && window.DeviceUtils.isDirectoryURL()) return;

        if (window.DeviceUtils && window.DeviceUtils.shouldRedirect(currentFile)) {
          var deviceType = window.DeviceUtils.getDeviceType();
          var targetFile =
            deviceType === window.DeviceUtils.DeviceType.MOBILE
              ? "index-mobile.html"
              : deviceType === window.DeviceUtils.DeviceType.TABLET
                ? "index-tablet.html"
                : "index-pc.html";
          location.href = targetFile;
        }
      })();
    </script>
    <!-- ═══ End Responsive Redirect ═══ -->

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        if (window.translationManager) window.translationManager.initialize();

        if (window.ProductGrid) {
          window.ProductGrid.renderMobile(18);
          document.querySelectorAll(".category-pill").forEach(function(pill) {
            pill.addEventListener("click", function() {
              var cat = this.dataset.category;
              document.querySelectorAll(".category-pill").forEach(function(p) { p.classList.remove("active"); });
              this.classList.add("active");
              document.querySelectorAll("#product-list .product-card-mobile").forEach(function(card) {
                card.style.display = (cat === "all" || card.dataset.category === cat) ? "" : "none";
              });
            });
          });
        }

          filterSheet.classList.add("open");
          filterOverlay.classList.remove("hidden");
          document.body.style.overflow = "hidden";
        }

        function closeFilterSheet() {
          filterSheet.classList.remove("open");
          filterOverlay.classList.add("hidden");
          document.body.style.overflow = "";
        }

        filterBtn.addEventListener("click", openFilter);
        closeFilter.addEventListener("click", closeFilterSheet);
        filterOverlay.addEventListener("click", closeFilterSheet);
        applyFilter.addEventListener("click", closeFilterSheet);
      });
    </script>

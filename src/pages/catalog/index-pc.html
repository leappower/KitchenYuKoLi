    <link rel="canonical" href="/catalog/" />
    <link rel="alternate" media="only screen and (max-width: 767px)" href="/catalog/index-mobile.html" />
    <link
      rel="alternate"
      media="only screen and (min-width: 768px) and (max-width: 1279px)"
      href="/catalog/index-tablet.html"
    />
    <link rel="alternate" media="only screen and (min-width: 1280px)" href="/catalog/index-pc.html" />
    <script>
      (function () {
        if (window.__redirectChecked) return;
        window.__redirectChecked = true;
        var urlParams = new URLSearchParams(location.search);
        var cleanUrl = urlParams.get("clean-url");
        if (cleanUrl) {
          history.replaceState({}, "", cleanUrl);
          return;
        }
        if (window.__spaNavigating) return;
        var currentFile = location.pathname.split("/").pop();
        if (window.DeviceUtils && window.DeviceUtils.isDirectoryURL()) return;
        if (window.DeviceUtils && window.DeviceUtils.shouldRedirect(currentFile)) {
          var deviceType = window.DeviceUtils.getDeviceType();
          var targetFile =
            deviceType === window.DeviceUtils.DeviceType.MOBILE
              ? "index-mobile.html"
              : deviceType === window.DeviceUtils.DeviceType.TABLET
                ? "index-tablet.html"
                : "index-pc.html";
          location.href = targetFile;
        }
      })();
    </script>

      "description": "YuKoLi 智能商厨设备全系列目录 — 切配、爆炒、煎炸、炖煮、蒸煮设备一站式选购，在线筛选对比，快速获取报价。",

  <body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-x-hidden"
  >
    <div class="relative flex min-h-screen flex-col">
      <navigator
        data-component="navigator"
        data-variant="pc"
        data-active="products"
        data-cta-text-key="nav_get_quote"
        data-cta-href="/quote"
      ></navigator>

      <main id="spa-content" class="flex-1">
        <!-- Hero -->
        <section
          class="py-16 bg-gradient-to-br from-primary/5 via-transparent to-orange-100/30 dark:from-primary/10 dark:to-orange-900/20"
        >
          <div class="max-w-7xl mx-auto px-6 lg:px-8">
            <h1 class="text-4xl lg:text-5xl font-black tracking-tight mb-4" data-i18n="catalog_hero_title">产品目录</h1>
            <p class="text-lg text-slate-600 dark:text-slate-400 max-w-2xl" data-i18n="catalog_hero_desc">
              浏览 Yukoli 智能商厨设备全系列产品，找到最适合您厨房的自动化方案。
            </p>
          </div>
        </section>

        <!-- Search + Filters -->
        <section
          class="sticky top-0 z-30 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-200 dark:border-slate-800"
        >
          <div class="max-w-7xl mx-auto px-6 lg:px-8 py-4">
            <div class="flex items-center gap-4">
              <div class="relative flex-1 max-w-md">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                  search
                </span>
                <input
                  id="catalog-search"
                  type="text"
                  placeholder="搜索产品型号或名称..."
                  data-i18n-placeholder="catalog_search_placeholder"
                  class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-transparent focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all"
                />
              </div>
              <div id="catalog-filters" class="flex items-center gap-2 overflow-x-auto"></div>
            </div>
          </div>
        </section>

        <!-- Product Grid -->
        <section class="max-w-7xl mx-auto px-6 lg:px-8 py-12">
          <div id="catalog-results-count" class="text-sm text-slate-500 dark:text-slate-400 mb-6"></div>
          <div id="catalog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
          <div id="catalog-empty" class="hidden text-center py-20">
            <span class="material-symbols-outlined text-6xl text-slate-300 dark:text-slate-600 mb-4 block">
              search_off
            </span>
            <h3 class="text-xl font-bold mb-2" data-i18n="catalog_empty_title">未找到匹配的产品</h3>
            <p class="text-slate-500 dark:text-slate-400" data-i18n="catalog_empty_desc">请尝试其他关键词或筛选条件</p>
          </div>
        </section>

        <!-- CTA -->
        <section class="py-16 bg-primary">
          <div class="max-w-4xl mx-auto px-6 lg:px-8 text-center">
            <h2 class="text-3xl font-black text-white mb-4" data-i18n="catalog_cta_title">找不到合适的产品？</h2>
            <p class="text-white/80 mb-8" data-i18n="catalog_cta_desc">告诉我们您的需求，我们为您提供定制方案。</p>
            <a
              href="/quote/"
              class="inline-flex items-center gap-2 bg-white text-primary px-8 py-4 rounded-xl font-bold hover:shadow-lg transition-all"
            >
              <span class="material-symbols-outlined">arrow_forward</span>
              <span data-i18n="catalog_cta_btn">获取定制方案</span>
            </a>
          </div>
        </section>
      </main>

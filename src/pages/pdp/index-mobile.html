<!doctype html>
<html class="light" lang="zh-CN">
  <head>
    <link rel="canonical" href="/pdp/" />
    <link rel="alternate" media="only screen and (max-width: 767px)" href="/pdp/index-mobile.html" />
    <link
      rel="alternate"
      media="only screen and (min-width: 768px) and (max-width: 1279px)"
      href="/pdp/index-tablet.html"
    />
    <link rel="alternate" media="only screen and (min-width: 1280px)" href="/pdp/index-pc.html" />
    <script>
      (function () {
        if (window.__redirectChecked) return;
        window.__redirectChecked = true;
        var urlParams = new URLSearchParams(location.search);
        var cleanUrl = urlParams.get("clean-url");
        if (cleanUrl) {
          history.replaceState({}, "", cleanUrl);
          return;
        }
        if (window.__spaNavigating) return;
        var currentFile = location.pathname.split("/").pop();
        if (window.DeviceUtils && window.DeviceUtils.isDirectoryURL()) return;
        if (window.DeviceUtils && window.DeviceUtils.shouldRedirect(currentFile)) {
          var deviceType = window.DeviceUtils.getDeviceType();
          var targetFile =
            deviceType === window.DeviceUtils.DeviceType.MOBILE
              ? "index-mobile.html"
              : deviceType === window.DeviceUtils.DeviceType.TABLET
                ? "index-tablet.html"
                : "index-pc.html";
          location.href = targetFile;
        }
      })();
    </script>
    <meta charset="utf-8" />
    <meta name="description" content="Yukoli 智能商厨设备产品详情。" />
    <meta name="robots" content="noindex,follow" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="产品详情 | Yukoli 智能商厨设备" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title data-i18n="pdp_page_title">产品详情 | Yukoli 智能商厨设备</title>
    <link rel="preload" href="/assets/fonts/local-fonts.css" as="style" />
    <link rel="preload" href="/assets/css/styles.css" as="style" />
    <link rel="preload" href="/assets/css/tailwind.css" as="style" />
    <link href="/assets/fonts/local-fonts.css" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <link rel="stylesheet" href="/assets/css/tailwind.css" />
    <link rel="stylesheet" href="/assets/css/z-index-system.css" />
    <link rel="stylesheet" href="/assets/css/performance-optimizations.css" />
    <script>
      (function () {
        if (localStorage.getItem("darkMode") === "true") document.documentElement.classList.add("dark");
      })();
    </script>
    <link rel="stylesheet" href="/assets/css/skeleton.css" />
    <link rel="icon" href="/assets/images/logo_header.webp" type="image/webp" />
  </head>
  <body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-x-hidden"
  >
    <div class="relative flex min-h-screen flex-col">
      <navigator
        data-component="navigator"
        data-variant="mobile"
        data-active="products"
        data-cta-text-key="nav_get_quote"
        data-cta-href="/quote"
      ></navigator>
      <main id="spa-content">
        <nav class="px-4 pt-3">
          <ol class="flex items-center gap-1 text-xs text-slate-500 dark:text-slate-400">
            <li><a href="/" data-i18n="nav_home" class="hover:text-primary">首页</a></li>
            <li><span class="material-symbols-outlined" style="font-size: 12px">chevron_right</span></li>
            <li><a href="/products/" data-i18n="nav_products" class="hover:text-primary">产品中心</a></li>
            <li><span class="material-symbols-outlined" style="font-size: 12px">chevron_right</span></li>
            <li
              id="breadcrumb-product"
              class="text-slate-900 dark:text-slate-100 font-medium truncate max-w-[120px]"
            ></li>
          </ol>
        </nav>
        <div id="product-content">
          <div class="px-4 py-6 animate-pulse"><div class="h-56 bg-slate-200 dark:bg-slate-700 rounded-xl"></div></div>
        </div>

        <!-- Product Specifications -->
        <section class="mb-8 px-4" id="specs-section">
          <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-5">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
              <span class="material-symbols-outlined text-primary">fact_check</span>
              <span data-i18n="pdp_specs_title">产品规格</span>
            </h2>
            <div class="grid grid-cols-1 gap-3" id="specs-grid">
              <div class="pdp-spec-placeholder text-center py-8 text-slate-400">
                <span class="material-symbols-outlined text-3xl mb-2 block">inventory_2</span>
                <p data-i18n="pdp_specs_placeholder" class="text-sm">选择产品后显示详细规格</p>
              </div>
            </div>
          </div>
        </section>

        <!-- Related Products -->
        <section class="mb-8 px-4">
          <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 p-5">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
              <span class="material-symbols-outlined text-primary">recommend</span>
              <span data-i18n="pdp_related_title">推荐产品</span>
            </h2>
            <div class="grid grid-cols-1 gap-4" id="related-products">
              <div class="pdp-related-placeholder text-center py-8 text-slate-400">
                <span class="material-symbols-outlined text-3xl mb-2 block">category</span>
                <p data-i18n="pdp_related_placeholder" class="text-sm">浏览更多同类产品</p>
              </div>
            </div>
          </div>
        </section>
      </main>
      <footer data-component="footer" data-variant="mobile" data-cta="true"></footer>
    </div>
    <script defer src="/assets/js/router.js"></script>
    <script src="/assets/js/translations.js"></script>
    <script src="/assets/js/ui/language-dropdown.js"></script>
    <script src="/assets/js/ui/mobile-menu.js"></script>
    <script src="/assets/js/ui/products-dropdown.js"></script>
    <script src="/assets/js/ui/solutions-dropdown.js"></script>
    <script src="/assets/js/ui/support-dropdown.js"></script>
    <script src="/assets/js/ui/about-dropdown.js"></script>
    <script src="/assets/js/ui/contact-dropdown.js"></script>
    <script src="/assets/js/ui/navigator.js"></script>
    <script src="/assets/js/ui/footer.js"></script>
    <script defer src="/assets/js/ui/floating-actions.js"></script>
    <script src="/assets/js/pdp.js"></script>
  </body>
</html>

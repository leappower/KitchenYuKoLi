<!doctype html>

<html class="light" lang="zh-CN">
  <head>
    <link rel="canonical" href="/contact/" />
    <link rel="alternate" media="only screen and (max-width: 767px)" href="/contact/index-mobile.html" />
    <link
      rel="alternate"
      media="only screen and (min-width: 768px) and (max-width: 1279px)"
      href="/contact/index-tablet.html"
    />
    <link rel="alternate" media="only screen and (min-width: 1280px)" href="/contact/index-pc.html" />
    <script>
      (function () {
        if (window.__redirectChecked) return;
        window.__redirectChecked = true;
        var urlParams = new URLSearchParams(location.search);
        var cleanUrl = urlParams.get("clean-url");
        if (cleanUrl) {
          history.replaceState({}, "", cleanUrl);
          return;
        }
        if (window.__spaNavigating) return;
        var currentFile = location.pathname.split("/").pop();
        if (window.DeviceUtils && window.DeviceUtils.isDirectoryURL()) return;
        if (window.DeviceUtils && window.DeviceUtils.shouldRedirect(currentFile)) {
          var deviceType = window.DeviceUtils.getDeviceType();
          var targetFile =
            deviceType === window.DeviceUtils.DeviceType.MOBILE
              ? "index-mobile.html"
              : deviceType === window.DeviceUtils.DeviceType.TABLET
                ? "index-tablet.html"
                : "index-pc.html";
          location.href = targetFile;
        }
      })();
    </script>

    <meta charset="utf-8" />
    <meta name="description" content="Contact Yukoli for industrial smart kitchen solutions." />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Yukoli | Contact Us</title>
    <link rel="preload" href="/assets/fonts/local-fonts.css" as="style" />
    <link rel="preload" href="/assets/css/styles.css" as="style" />
    <link rel="preload" href="/assets/css/tailwind.css" as="style" />
    <link href="/assets/fonts/local-fonts.css" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <link rel="stylesheet" href="/assets/css/tailwind.css" />
    <link rel="stylesheet" href="/assets/css/z-index-system.css" />
    <link rel="stylesheet" href="/assets/css/performance-optimizations.css" />
    <script>
      (function () {
        if (localStorage.getItem("darkMode") === "true") document.documentElement.classList.add("dark");
      })();
    </script>
    <link rel="stylesheet" href="/assets/css/skeleton.css" />
    <link rel="icon" href="/assets/images/logo_header.webp" type="image/webp" />
  </head>
  <body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased transition-colors duration-300 overflow-x-hidden"
  >
    <navigator
      data-component="navigator"
      data-variant="mobile"
      data-active="contact"
      data-cta-text-key="nav_get_quote"
      data-cta-href="/quote"
    ></navigator>

    <main id="spa-content" class="px-4 py-6">
      <!-- Hero -->
      <section class="mb-8">
        <div
          class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-primary/10 text-primary text-xs font-bold uppercase tracking-wider mb-3"
        >
          <span class="material-symbols-outlined text-sm">mail</span>
          <span data-i18n="contact_hero_badge">联系我们</span>
        </div>
        <h1 class="text-3xl font-black leading-tight tracking-tighter mb-3">
          <span data-i18n="contact_mobile_hero_title">联系</span>
          <span class="text-primary" data-i18n="contact_mobile_hero_title_highlight">我们</span>
        </h1>
        <p class="text-slate-600 dark:text-slate-400 text-sm" data-i18n="contact_mobile_hero_desc">
          我们随时为您提供报价、支持和合作服务。
        </p>
      </section>

      <!-- Quick Contact -->
      <section class="mb-6">
        <div class="grid grid-cols-3 gap-2">
          <a
            href="mailto:info@yukoli.com"
            class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-3 text-center"
          >
            <span class="material-symbols-outlined text-primary text-lg">email</span>
            <p class="text-xs font-bold mt-1" data-i18n="contact_mobile_quick_email">邮件</p>
          </a>
          <a
            href="tel:+8675588888888"
            class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-3 text-center"
          >
            <span class="material-symbols-outlined text-primary text-lg">phone</span>
            <p class="text-xs font-bold mt-1" data-i18n="contact_mobile_quick_call">电话</p>
          </a>
          <a
            href="https://wa.me/8613800138000"
            class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-3 text-center"
          >
            <span class="material-symbols-outlined text-primary text-lg">chat</span>
            <p class="text-xs font-bold mt-1">WhatsApp</p>
          </a>
        </div>
      </section>

      <!-- Contact Form -->
      <section class="mb-8">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-4">
          <h3 class="font-bold mb-3" data-i18n="contact_mobile_form_title">发送留言</h3>
          <form class="space-y-2">
            <input
              type="text"
              class="w-full px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-transparent text-sm"
              placeholder="Your Name"
              data-i18n-placeholder="contact_mobile_form_name_placeholder"
            />
            <input
              type="email"
              class="w-full px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-transparent text-sm"
              placeholder="Email"
              data-i18n-placeholder="contact_mobile_form_email_placeholder"
            />
            <input
              type="text"
              class="w-full px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-transparent text-sm"
              placeholder="Company"
              data-i18n-placeholder="contact_mobile_form_company_placeholder"
            />
            <textarea
              rows="3"
              class="w-full px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-transparent text-sm resize-none"
              placeholder="Message"
              data-i18n-placeholder="contact_mobile_form_message_placeholder"
            ></textarea>
            <button
              type="submit"
              class="w-full bg-primary text-white py-2.5 rounded-lg font-bold text-sm"
              data-i18n="contact_mobile_form_submit"
            >
              发送
            </button>
          </form>
        </div>
      </section>

      <!-- Offices -->
      <section class="mb-8">
        <h2 class="text-lg font-bold mb-3" data-i18n="contact_mobile_offices_title">我们的办公室</h2>
        <div class="space-y-2">
          <div
            class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg p-3 flex items-center gap-3"
          >
            <span class="text-xl">🇨🇳</span>
            <div>
              <p class="font-bold text-sm" data-i18n="contact_office_hq_city">中国深圳（总部）</p>
              <p class="text-xs text-slate-500">Hi-Tech Park, Nanshan</p>
            </div>
          </div>
          <div
            class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg p-3 flex items-center gap-3"
          >
            <span class="text-xl">🇸🇬</span>
            <div>
              <p class="font-bold text-sm" data-i18n="contact_mobile_office_singapore">新加坡</p>
              <p class="text-xs text-slate-500">Marina Bay Financial Centre</p>
            </div>
          </div>
          <div
            class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg p-3 flex items-center gap-3"
          >
            <span class="text-xl">🇩🇪</span>
            <div>
              <p class="font-bold text-sm" data-i18n="contact_mobile_office_frankfurt">德国法兰克福</p>
              <p class="text-xs text-slate-500">Mainzer Landstraße 41</p>
            </div>
          </div>
        </div>
      </section>

      <!-- Partner -->
      <section class="bg-slate-900 text-white rounded-xl p-5 text-center">
        <h2 class="text-lg font-black mb-2" data-i18n="contact_partner_title">成为合作伙伴</h2>
        <p class="text-slate-300 text-xs mb-3" data-i18n="contact_mobile_partner_desc">加入我们的全球分销商网络。</p>
        <button
          class="bg-primary text-white px-5 py-2 rounded-lg font-bold text-sm"
          data-i18n="contact_mobile_partner_btn"
        >
          申请
        </button>
      </section>
    </main>

    <script defer src="/assets/js/ui/products-dropdown.js"></script>
    <script defer src="/assets/js/ui/navigator.js"></script>
    <script defer src="/assets/js/ui/footer.js"></script>
    <script defer src="/assets/js/lang-registry.js"></script>
    <script defer src="/assets/js/translations.js"></script>
    <script defer src="/assets/js/page-interactions.js"></script>
    <script src="/assets/js/utils/device-utils.js"></script>
    <script src="/assets/js/spa-router.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        if (window.SpaRouter && typeof window.SpaRouter.init === "function") {
          window.SpaRouter.init();
        }
      });
    </script>
  </body>
</html>

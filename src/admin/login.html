<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — YuKoLi CMS</title>
  <link rel="stylesheet" href="/admin/assets/css/cms.css?v=4">
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); display: flex; align-items: center; justify-content: center; }
    .login-card { max-width: 24rem; width: 100%; margin: 1rem; background: #fff; border-radius: 1rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); padding: 2rem; }
    .login-card h1 { font-size: 1.5rem; font-weight: 700; color: #111827; }
    .login-card p { font-size: 0.875rem; color: #6b7280; margin-top: 0.25rem; }
    .login-card label { display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.25rem; }
    .login-card input { width: 100%; padding: 0.625rem 1rem; border: 1px solid #d1d5db; border-radius: 0.5rem; outline: none; font-size: 0.875rem; }
    .login-card input:focus { border-color: #4f46e5; box-shadow: 0 0 0 2px rgba(79,70,229,0.2); }
    .login-card button[type=submit] { width: 100%; padding: 0.625rem; background: #4f46e5; color: #fff; border: none; border-radius: 0.5rem; font-weight: 500; cursor: pointer; font-size: 0.875rem; }
    .login-card button[type=submit]:hover { background: #4338ca; }
    .login-card button[type=submit]:disabled { background: #a5b4fc; }
  </style>
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm mx-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <div class="text-center mb-8">
        <div class="text-3xl mb-3">🍳</div>
        <h1 class="text-2xl font-bold text-gray-900">YuKoLi CMS</h1>
        <p class="text-gray-500 text-sm mt-1">后台管理系统</p>
      </div>

      <form id="loginForm">
        <div id="errorBox" class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm" style="display:none"></div>

        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
          <input type="text" name="username" required autocomplete="username"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
          <input type="password" name="password" required autocomplete="current-password"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
        </div>

        <button type="submit" id="loginBtn"
          class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 text-white font-medium py-2.5 rounded-lg transition cursor-pointer">
          登录
        </button>
      </form>
    </div>
  </div>

  <script>
  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    var form = e.target;
    var username = form.username.value.trim();
    var password = form.password.value;
    var errorBox = document.getElementById('errorBox');
    var loginBtn = document.getElementById('loginBtn');

    errorBox.style.display = 'none';

    if (!username || !password) {
      errorBox.textContent = '请输入用户名和密码';
      errorBox.style.display = 'block';
      return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = '登录中...';

    try {
      var res = await fetch('/api/cms/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: password })
      });

      var data = await res.json();

      if (!res.ok) {
        errorBox.textContent = data.error || '登录失败';
        errorBox.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.textContent = '登录';
        return;
      }

      localStorage.setItem('cms_token', data.token);
      localStorage.setItem('cms_user', JSON.stringify(data.user));
      window.location.href = '/admin/';
    } catch (err) {
      errorBox.textContent = '网络错误: ' + err.message;
      errorBox.style.display = 'block';
      loginBtn.disabled = false;
      loginBtn.textContent = '登录';
    }
  });
  </script>
</body>
</html>

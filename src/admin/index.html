<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YuKoLi CMS</title>
  <link rel="stylesheet" href="/admin/assets/css/cms.css?v=5">
</head>
<body>
  <div id="app" style="display:none">

    <!-- Toast -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Sidebar overlay (mobile) -->
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
      <div class="p-4 flex items-center gap-3 border-b border-slate-700">
        <div class="text-2xl">🍳</div>
        <div>
          <div class="font-semibold text-sm">YuKoLi</div>
          <div style="color:#64748b;font-size:0.75rem">CMS</div>
        </div>
        <button onclick="closeSidebar()" style="margin-left:auto;background:none;border:none;color:#94a3b8;cursor:pointer;font-size:1rem">✕</button>
      </div>

      <nav id="nav-menu" style="flex:1;padding:1rem 0.5rem;display:flex;flex-direction:column;gap:0.25rem">
      </nav>

      <div style="padding:1rem;border-top:1px solid #1e293b">
        <div class="flex items-center gap-3">
          <div id="user-avatar" style="width:2rem;height:2rem;border-radius:9999px;background:#4f46e5;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:#fff">?</div>
          <div class="flex-1" style="min-width:0">
            <div class="text-sm font-medium truncate" id="user-name">—</div>
            <div style="font-size:0.75rem;color:#94a3b8" id="user-role">—</div>
          </div>
          <button onclick="logout()" style="background:none;border:none;color:#94a3b8;cursor:pointer" title="退出">⏻</button>
        </div>
      </div>
    </div>

    <!-- Main -->
    <div class="main-content">
      <header class="top-bar">
        <button class="burger" onclick="openSidebar()">☰</button>
        <div class="flex-1 text-sm" style="color:#6b7280">
          <span id="breadcrumb">Dashboard</span>
        </div>
        <button class="btn-green" id="btn-publish" onclick="publishProducts()">🚀 发布</button>
      </header>

      <div class="content-area" id="content-area">
        <!-- Filled by JS -->
      </div>
    </div>
  </div>

  <script src="/admin/assets/js/cms.js?v=3"></script>
</body>
</html>

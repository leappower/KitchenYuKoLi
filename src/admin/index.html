<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YuKoLi CMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    [x-cloak] { display: none !important; }
    .sidebar-link { transition: all 0.15s ease; }
    .sidebar-link:hover { background: rgba(99,102,241,0.1); }
    .sidebar-link.active { background: rgba(99,102,241,0.15); color: #6366f1; border-right: 3px solid #6366f1; }
    .fade-in { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .toast-enter { animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="cmsApp()" x-init="init()" x-cloak>

  <!-- Toast notifications -->
  <div class="fixed top-4 right-4 z-50 space-y-2" style="min-width:280px">
    <template x-for="t in toasts" :key="t.id">
      <div class="toast-enter p-4 rounded-lg shadow-lg text-white text-sm flex items-center gap-2"
        :class="t.type === 'error' ? 'bg-red-500' : t.type === 'warning' ? 'bg-yellow-500' : 'bg-green-500'">
        <span x-text="t.type === 'error' ? '✕' : '✓'"></span>
        <span x-text="t.msg"></span>
      </div>
    </template>
  </div>

  <!-- Mobile sidebar overlay -->
  <div x-show="sidebarOpen" x-transition.opacity @click="sidebarOpen = false" class="fixed inset-0 bg-black/30 z-30 lg:hidden"></div>

  <div class="flex h-screen">
    <!-- Sidebar -->
    <aside class="fixed lg:static inset-y-0 left-0 z-40 w-56 bg-slate-900 text-white flex flex-col transition-transform lg:translate-x-0"
      :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'">
      <div class="p-4 flex items-center gap-3 border-b border-slate-700">
        <img src="/assets/images/logo_header.webp" class="h-8" onerror="this.style.display='none'" alt="">
        <div>
          <div class="font-semibold text-sm">YuKoLi</div>
          <div class="text-xs text-slate-400">CMS</div>
        </div>
        <button @click="sidebarOpen = false" class="ml-auto lg:hidden text-slate-400">✕</button>
      </div>

      <nav class="flex-1 py-4 space-y-1 px-2">
        <template x-for="item in menuItems" :key="item.key">
          <button @click="page = item.key; sidebarOpen = false"
            class="sidebar-link w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm"
            :class="page === item.key ? 'active' : 'text-slate-300'"
            :disabled="item.disabled"
            :style="item.disabled ? 'opacity:0.4;cursor:not-allowed' : ''">
            <span x-text="item.icon"></span>
            <span x-text="item.label"></span>
            <span x-show="item.badge" class="ml-auto text-xs bg-indigo-500 px-1.5 py-0.5 rounded-full" x-text="item.badge"></span>
          </button>
        </template>
      </nav>

      <div class="p-4 border-t border-slate-700">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-xs font-bold" x-text="user?.username?.charAt(0)?.toUpperCase() || '?'"></div>
          <div class="flex-1 min-w-0">
            <div class="text-sm font-medium truncate" x-text="user?.username"></div>
            <div class="text-xs text-slate-400" x-text="user?.role === 'admin' ? '管理员' : '编辑'"></div>
          </div>
          <button @click="logout()" class="text-slate-400 hover:text-white text-sm" title="退出">⏻</button>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 flex flex-col overflow-hidden">
      <!-- Top bar -->
      <header class="bg-white border-b border-gray-200 px-4 lg:px-6 h-14 flex items-center gap-4 shrink-0">
        <button @click="sidebarOpen = true" class="lg:hidden text-gray-600">☰</button>

        <div class="flex-1 text-sm text-gray-600">
          <span x-text="menuItems.find(m => m.key === page)?.label || ''"></span>
        </div>

        <button @click="publishProducts()" :disabled="publishing || user?.role !== 'admin'"
          class="flex items-center gap-2 bg-green-600 hover:bg-green-700 disabled:bg-gray-300 text-white text-sm px-4 py-1.5 rounded-lg transition">
          <span x-show="!publishing">🚀 发布</span>
          <span x-show="publishing">发布中...</span>
        </button>
      </header>

      <!-- Content area -->
      <div class="flex-1 overflow-auto p-4 lg:p-6">

        <!-- Dashboard -->
        <div x-show="page === 'dashboard'" class="fade-in">
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-xl border p-5">
              <div class="text-sm text-gray-500">产品总数</div>
              <div class="text-2xl font-bold mt-1" x-text="stats.products">0</div>
            </div>
            <div class="bg-white rounded-xl border p-5">
              <div class="text-sm text-gray-500">产品系列</div>
              <div class="text-2xl font-bold mt-1" x-text="stats.categories">0</div>
            </div>
            <div class="bg-white rounded-xl border p-5">
              <div class="text-sm text-gray-500">媒体文件</div>
              <div class="text-2xl font-bold mt-1" x-text="stats.media">0</div>
            </div>
            <div class="bg-white rounded-xl border p-5">
              <div class="text-sm text-gray-500">上次发布</div>
              <div class="text-sm font-medium mt-1" x-text="stats.lastPublish || '未发布'"></div>
            </div>
          </div>

          <div class="bg-white rounded-xl border">
            <div class="px-5 py-3 border-b font-medium text-sm">最近操作</div>
            <div class="divide-y">
              <template x-for="log in auditLogs" :key="log.id">
                <div class="px-5 py-3 text-sm flex items-center gap-3">
                  <span class="w-6 h-6 rounded-full flex items-center justify-center text-xs"
                    :class="log.action === 'create' ? 'bg-green-100 text-green-600' : log.action === 'delete' ? 'bg-red-100 text-red-600' : 'bg-blue-100 text-blue-600'"
                    x-text="log.action === 'create' ? '+' : log.action === 'delete' ? '−' : '✎'"></span>
                  <span class="text-gray-600" x-text="log.username"></span>
                  <span class="text-gray-500" x-text="log.action"></span>
                  <span class="text-gray-400" x-text="log.table_name"></span>
                  <span class="ml-auto text-xs text-gray-400" x-text="log.created_at"></span>
                </div>
              </template>
              <div x-show="auditLogs.length === 0" class="px-5 py-8 text-center text-gray-400 text-sm">暂无操作记录</div>
            </div>
          </div>
        </div>

        <!-- Categories -->
        <div x-show="page === 'categories'" class="fade-in">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold">产品系列</h2>
            <button @click="openCategoryForm()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm px-4 py-2 rounded-lg">+ 新增系列</button>
          </div>

          <div class="bg-white rounded-xl border overflow-hidden">
            <table class="w-full text-sm">
              <thead class="bg-gray-50 border-b">
                <tr>
                  <th class="text-left px-4 py-3 font-medium text-gray-600">Slug</th>
                  <th class="text-left px-4 py-3 font-medium text-gray-600">i18n Key</th>
                  <th class="text-left px-4 py-3 font-medium text-gray-600">排序</th>
                  <th class="text-left px-4 py-3 font-medium text-gray-600">状态</th>
                  <th class="text-left px-4 py-3 font-medium text-gray-600">产品数</th>
                  <th class="text-right px-4 py-3 font-medium text-gray-600">操作</th>
                </tr>
              </thead>
              <tbody class="divide-y">
                <template x-for="cat in categories" :key="cat.id">
                  <tr class="hover:bg-gray-50">
                    <td class="px-4 py-3 font-mono text-sm" x-text="cat.slug"></td>
                    <td class="px-4 py-3 text-gray-600" x-text="cat.i18n_key || '—'"></td>
                    <td class="px-4 py-3" x-text="cat.sort_order"></td>
                    <td class="px-4 py-3">
                      <span class="px-2 py-0.5 rounded-full text-xs" :class="cat.is_active ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'"
                        x-text="cat.is_active ? '启用' : '禁用'"></span>
                    </td>
                    <td class="px-4 py-3" x-text="cat.product_count || 0"></td>
                    <td class="px-4 py-3 text-right space-x-2">
                      <button @click="openCategoryForm(cat)" class="text-indigo-600 hover:underline text-xs">编辑</button>
                      <button @click="deleteCategory(cat)" class="text-red-500 hover:underline text-xs" x-show="user?.role === 'admin'">删除</button>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
            <div x-show="categories.length === 0" class="py-12 text-center text-gray-400">暂无产品系列</div>
          </div>
        </div>

        <!-- Products -->
        <div x-show="page === 'products'" class="fade-in">
          <!-- Filters -->
          <div class="flex flex-wrap items-center gap-3 mb-4">
            <select x-model="productFilter.category_id" @change="loadProducts()" class="border rounded-lg px-3 py-2 text-sm bg-white">
              <option value="">全部系列</option>
              <template x-for="cat in categories" :key="cat.id">
                <option :value="cat.id" x-text="cat.slug"></option>
              </template>
            </select>
            <select x-model="productFilter.status" @change="loadProducts()" class="border rounded-lg px-3 py-2 text-sm bg-white">
              <option value="">全部状态</option>
              <option value="在售">在售</option>
              <option value="停产">停产</option>
              <option value="预售">预售</option>
            </select>
            <input x-model="productFilter.search" @input.debounce.300ms="loadProducts()" type="text" placeholder="搜索型号..."
              class="border rounded-lg px-3 py-2 text-sm flex-1 min-w-[150px]">
            <button @click="openProductForm()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm px-4 py-2 rounded-lg ml-auto">+ 新增产品</button>
          </div>

          <!-- Product grid -->
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            <template x-for="p in products" :key="p.id">
              <div @click="openProductForm(p)" class="bg-white rounded-xl border overflow-hidden hover:shadow-md hover:border-indigo-300 cursor-pointer transition group">
                <div class="aspect-square bg-gray-50 flex items-center justify-center overflow-hidden">
                  <template x-if="p.primary_image">
                    <img :src="p.primary_image" class="w-full h-full object-cover group-hover:scale-105 transition">
                  </template>
                  <template x-if="!p.primary_image">
                    <div class="text-4xl text-gray-300">📦</div>
                  </template>
                </div>
                <div class="p-3">
                  <div class="flex items-center gap-2">
                    <span class="font-medium text-sm" x-text="p.model"></span>
                    <span x-show="p.badge" class="text-xs px-1.5 py-0.5 rounded-full" :class="'bg-indigo-500 text-white'" x-text="p.badge"></span>
                  </div>
                  <div class="text-xs text-gray-500 mt-1" x-text="p.category_slug || '未分类'"></div>
                </div>
              </div>
            </template>
          </div>
          <div x-show="products.length === 0" class="py-16 text-center text-gray-400">暂无产品</div>
        </div>

        <!-- Media -->
        <div x-show="page === 'media'" class="fade-in">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold">媒体库</h2>
            <label class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm px-4 py-2 rounded-lg cursor-pointer">
              上传文件
              <input type="file" multiple accept="image/*,video/mp4,.pdf" class="hidden" @change="uploadMedia($event)">
            </label>
          </div>

          <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">
            <template x-for="m in media" :key="m.id">
              <div class="bg-white rounded-lg border overflow-hidden group relative">
                <div class="aspect-square bg-gray-50 flex items-center justify-center">
                  <template x-if="m.mime_type?.startsWith('image/')">
                    <img :src="m.file_path" class="w-full h-full object-cover">
                  </template>
                  <template x-if="m.mime_type === 'video/mp4'">
                    <span class="text-3xl">🎬</span>
                  </template>
                  <template x-if="m.mime_type === 'application/pdf'">
                    <span class="text-3xl">📄</span>
                  </template>
                </div>
                <div class="p-2">
                  <div class="text-xs truncate" x-text="m.original_name"></div>
                  <div class="text-xs text-gray-400" x-text="formatBytes(m.file_size)"></div>
                </div>
                <button @click.stop="deleteMedia(m)" class="absolute top-1 right-1 bg-red-500 text-white w-6 h-6 rounded-full text-xs opacity-0 group-hover:opacity-100 transition">✕</button>
              </div>
            </template>
          </div>
          <div x-show="media.length === 0" class="py-16 text-center text-gray-400">暂无媒体文件</div>
        </div>

      </div>
    </main>
  </div>

  <!-- Category Form Modal -->
  <div x-show="categoryModal.show" x-transition.opacity class="fixed inset-0 z-50 flex items-center justify-center p-4" @click.self="categoryModal.show = false">
    <div class="fixed inset-0 bg-black/30" @click="categoryModal.show = false"></div>
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md relative z-10 p-6" x-transition>
      <h3 class="text-lg font-semibold mb-4" x-text="categoryModal.id ? '编辑系列' : '新增系列'"></h3>
      <form @submit.prevent="saveCategory()">
        <div class="space-y-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Slug *</label>
            <input x-model="categoryModal.slug" required class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="e.g. large-wok">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">i18n Key</label>
            <input x-model="categoryModal.i18n_key" class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="e.g. nav_large_wok">
          </div>
          <div class="flex gap-3">
            <div class="flex-1">
              <label class="block text-sm font-medium text-gray-700 mb-1">排序</label>
              <input x-model.number="categoryModal.sort_order" type="number" class="w-full border rounded-lg px-3 py-2 text-sm">
            </div>
            <div class="flex-1">
              <label class="block text-sm font-medium text-gray-700 mb-1">状态</label>
              <select x-model="categoryModal.is_active" class="w-full border rounded-lg px-3 py-2 text-sm">
                <option :value="true">启用</option>
                <option :value="false">禁用</option>
              </select>
            </div>
          </div>
        </div>
        <div class="flex justify-end gap-3 mt-6">
          <button type="button" @click="categoryModal.show = false" class="px-4 py-2 text-sm border rounded-lg hover:bg-gray-50">取消</button>
          <button type="submit" class="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Product Form Modal -->
  <div x-show="productModal.show" x-transition.opacity class="fixed inset-0 z-50 flex items-start justify-center p-4 overflow-y-auto" @click.self="productModal.show = false">
    <div class="fixed inset-0 bg-black/30" @click="productModal.show = false"></div>
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl relative z-10 my-8 p-6" x-transition>
      <h3 class="text-lg font-semibold mb-4" x-text="productModal.id ? '编辑产品' : '新增产品'"></h3>
      <form @submit.prevent="saveProduct()">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">型号 *</label>
            <input x-model="productModal.model" required class="w-full border rounded-lg px-3 py-2 text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">子类</label>
            <input x-model="productModal.sub_category" class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="e.g. P_ESL">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">产品系列</label>
            <select x-model="productModal.category_id" class="w-full border rounded-lg px-3 py-2 text-sm">
              <option value="">未分类</option>
              <template x-for="cat in categories" :key="cat.id">
                <option :value="cat.id" x-text="cat.slug"></option>
              </template>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">状态</label>
            <select x-model="productModal.status" class="w-full border rounded-lg px-3 py-2 text-sm">
              <option>在售</option>
              <option>停产</option>
              <option>预售</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Badge</label>
            <input x-model="productModal.badge" class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="e.g. 热销">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Badge 颜色</label>
            <input x-model="productModal.badge_color" class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="e.g. bg-red-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">功率</label>
            <input x-model="productModal.power" class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="e.g. 25kW">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">产能</label>
            <input x-model="productModal.throughput" class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="e.g. 10-20kg/锅次">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">平均时间</label>
            <input x-model="productModal.average_time" class="w-full border rounded-lg px-3 py-2 text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">电压</label>
            <input x-model="productModal.voltage" class="w-full border rounded-lg px-3 py-2 text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">频率</label>
            <input x-model="productModal.frequency" class="w-full border rounded-lg px-3 py-2 text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">材质</label>
            <input x-model="productModal.material" class="w-full border rounded-lg px-3 py-2 text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">尺寸</label>
            <input x-model="productModal.product_dimensions" class="w-full border rounded-lg px-3 py-2 text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">颜色</label>
            <input x-model="productModal.color" class="w-full border rounded-lg px-3 py-2 text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">控制方式</label>
            <input x-model="productModal.control_method" class="w-full border rounded-lg px-3 py-2 text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">上市时间</label>
            <input x-model="productModal.launch_time" class="w-full border rounded-lg px-3 py-2 text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">排序</label>
            <input x-model.number="productModal.sort_order" type="number" class="w-full border rounded-lg px-3 py-2 text-sm">
          </div>
        </div>

        <!-- Images section -->
        <div class="mt-4 pt-4 border-t">
          <div class="flex items-center justify-between mb-2">
            <label class="text-sm font-medium text-gray-700">产品图片</label>
            <label class="text-xs text-indigo-600 cursor-pointer hover:underline">
              上传图片
              <input type="file" accept="image/*" multiple class="hidden" @change="uploadProductImage($event)">
            </label>
          </div>
          <div class="flex flex-wrap gap-2">
            <template x-for="img in productModal.images" :key="img.id">
              <div class="relative group w-20 h-20 rounded-lg border overflow-hidden">
                <img :src="img.file_path" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center gap-1">
                  <button @click="setImagePrimary(img)" class="text-white text-xs px-1" title="设为主图">★</button>
                  <button @click="deleteProductImage(img)" class="text-red-300 text-xs px-1">✕</button>
                </div>
                <div x-show="img.is_primary" class="absolute top-0 left-0 bg-indigo-500 text-white text-[10px] px-1">主图</div>
              </div>
            </template>
            <div x-show="productModal.images?.length === 0" class="text-sm text-gray-400 py-4">暂无图片，点击上传</div>
          </div>
        </div>

        <div class="flex justify-between mt-6">
          <button type="button" x-show="productModal.id && user?.role === 'admin'" @click="deleteProduct()" class="px-4 py-2 text-sm text-red-600 border border-red-200 rounded-lg hover:bg-red-50">删除产品</button>
          <div></div>
          <div class="flex gap-3">
            <button type="button" @click="productModal.show = false" class="px-4 py-2 text-sm border rounded-lg hover:bg-gray-50">取消</button>
            <button type="submit" class="px-4 py-2 text-sm bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">保存</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="assets/js/cms.js"></script>
</body>
</html>
